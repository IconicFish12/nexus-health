apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-gateway
  labels:
    app: caddy-gateway
    component: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy-gateway
  template:
    metadata:
      labels:
        app: caddy-gateway
    spec:
      containers:
      - name: caddy
        image: caddy:2-alpine
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      volumes:
      - name: caddy-config
        configMap:
          name: caddy-config

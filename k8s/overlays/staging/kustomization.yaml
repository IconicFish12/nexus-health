# ---------------------------------------------------------------------------
# STAGING ENVIRONMENT OVERLAY
# Customizes base resources for testing and validation.
# ---------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Kustomize automatically places all resources into this namespace
namespace: nexus-health-staging

# Environment-specific overrides
patches:
- path: patches/replicas.yaml  # Downscales pods to save costs in staging
- path: patches/resources.yaml # Decreases resource demands for staging workloads
